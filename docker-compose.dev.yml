services:
  postgres-dev:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: primeloop_dev
      POSTGRES_USER: primeloop
      POSTGRES_PASSWORD: primeloop_dev
    ports:
      - "55433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "primeloop", "-d", "primeloop_dev"]
      interval: 2s
      timeout: 2s
      retries: 20

  backend-dev:
    image: local/primeloop-backend:current
    environment:
      DATABASE_URL: postgresql://primeloop:primeloop_dev@postgres-dev:5432/primeloop_dev
      SECRET_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      LANGGRAPH_API_URL: ${LANGGRAPH_API_URL:-http://192.168.20.14:8000}
      RACLETTE_API_URL: ${RACLETTE_API_URL:-http://192.168.20.169:9119}
      RACLETTE_SESSION_TOKEN: ${RACLETTE_SESSION_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-C0AU0620ATX}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOCAL_LLM_ENABLED: ${LOCAL_LLM_ENABLED:-0}
      LOCAL_LLM_TYPE: ${LOCAL_LLM_TYPE:-auto}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-}
      LOCAL_LLM_HOST: ${LOCAL_LLM_HOST:-}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-}
      LOCAL_LLM_NAME: ${LOCAL_LLM_NAME:-local-env}
      GITEA_TOKEN: ${GITEA_TOKEN:-}
      AGENT_REPO_ROOT: /workspace/repo
      AGENT_WORKTREE_ROOT: /workspace/agents
    ports:
      - "3101:3100"
    volumes:
      - /mnt/user/appdata/primeloop-dev/codex:/root/.codex
      - /mnt/user/appdata/primeloop-dev/workspace:/workspace
    depends_on:
      postgres-dev:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_dev_data:
