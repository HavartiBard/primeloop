services:
  postgres-dev:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: primeloop_dev
      POSTGRES_USER: primeloop
      POSTGRES_PASSWORD: primeloop_dev
    ports:
      - "55433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "primeloop", "-d", "primeloop_dev"]
      interval: 2s
      timeout: 2s
      retries: 20

  backend-dev:
    image: local/primeloop-backend:current
    environment:
      DATABASE_URL: postgresql://primeloop:primeloop_dev@postgres-dev:5432/primeloop_dev
      SECRET_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-C0AU0620ATX}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITEA_TOKEN: ${GITEA_TOKEN:-}
      AGENT_REPO_ROOT: /workspace/repo
      AGENT_WORKTREE_ROOT: /workspace/agents
      LAUNCHER_AUTH_SECRET: ${LAUNCHER_AUTH_SECRET:-change-me-in-development}
      LAUNCHER_URL: ${LAUNCHER_URL:-http://launcher-dev:8787}
      LAUNCHER_ENABLED: ${LAUNCHER_ENABLED:-0}
      LAUNCHER_ADAPTER: ${LAUNCHER_ADAPTER:-docker}
    ports:
      - "3101:3100"
    volumes:
      - /mnt/user/appdata/primeloop-dev/codex:/root/.codex
      - /mnt/user/appdata/primeloop-dev/workspace:/workspace
    depends_on:
      postgres-dev:
        condition: service_healthy
      launcher-dev:
        condition: service_started
    restart: unless-stopped

  launcher-dev:
    image: local/primeloop-backend:current
    command: ["node", "dist/launcher/index.js"]
    environment:
      LAUNCHER_AUTH_SECRET: ${LAUNCHER_AUTH_SECRET:-change-me-in-development}
      LAUNCHER_PORT: ${LAUNCHER_PORT:-8787}
      LAUNCHER_VERSION: ${LAUNCHER_VERSION:-1.0.0}
      LAUNCHER_ADAPTER: ${LAUNCHER_ADAPTER:-docker}
      OPENSANDBOX_URL: ${OPENSANDBOX_URL:-http://opensandbox:8080}
      OPENSANDBOX_API_KEY: ${OPENSANDBOX_API_KEY:-}
      OPENSANDBOX_IMAGE_OPENCODE: ${OPENSANDBOX_IMAGE_OPENCODE:-opencode/opencode:latest}
    ports:
      - "8787:8787"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/user/appdata/primeloop-dev/workspace:/workspace
    depends_on:
      postgres-dev:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_dev_data:
