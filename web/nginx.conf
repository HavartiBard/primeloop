server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /events {
        proxy_pass http://backend:3100/events;
    }

    location /agents {
        proxy_pass http://backend:3100/agents;
    }

    location /webhook/langgraph/ {
        proxy_pass http://backend:3100/webhook/langgraph/;
    }

    location /ws {
        proxy_pass http://backend:3100/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
