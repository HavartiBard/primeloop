name: release-image

# Builds the PrimeLoop image (multi-arch: amd64 + arm64) and pushes it to the
# registry configured in repository secrets. Registry-agnostic: works with
# GHCR, Docker Hub, or a public Gitea package registry.
#
# Required secrets:
#   RELEASE_IMAGE          — full image name without tag, e.g. ghcr.io/<owner>/primeloop
#   RELEASE_REGISTRY_USER  — registry username
#   RELEASE_REGISTRY_TOKEN — registry password / PAT with package:write
#
# Pushes :latest on main, plus the version tag on v* tags. The version is
# baked into the image (PRIMELOOP_VERSION) and reported by GET /health.

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  release-image:
    runs-on: linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and push (multi-arch)
        run: |
          set -euo pipefail
          IMAGE="${{ secrets.RELEASE_IMAGE }}"
          if [ -z "$IMAGE" ]; then
            echo "RELEASE_IMAGE secret is not set; skipping publish." >&2
            exit 0
          fi
          REGISTRY="${IMAGE%%/*}"

          echo "${{ secrets.RELEASE_REGISTRY_TOKEN }}" \
            | docker login "$REGISTRY" -u "${{ secrets.RELEASE_REGISTRY_USER }}" --password-stdin

          VERSION="dev"
          TAGS="-t ${IMAGE}:latest"
          case "${{ github.ref }}" in
            refs/tags/v*)
              VERSION="${GITHUB_REF#refs/tags/}"
              TAGS="$TAGS -t ${IMAGE}:${VERSION}"
              ;;
            *)
              VERSION="main-$(git rev-parse --short HEAD)"
              ;;
          esac

          # buildx CLI plugin (runner's docker may not ship it)
          if ! docker buildx version >/dev/null 2>&1; then
            BUILDX_VERSION=v0.19.3
            mkdir -p ~/.docker/cli-plugins
            curl -fsSL "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-amd64" \
              -o ~/.docker/cli-plugins/docker-buildx
            chmod +x ~/.docker/cli-plugins/docker-buildx
            docker buildx version
          fi

          # QEMU for the non-native platform
          docker run --privileged --rm tonistiigi/binfmt --install arm64 >/dev/null || true
          docker buildx create --use --name primeloop-release 2>/dev/null || docker buildx use primeloop-release

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg PRIMELOOP_VERSION="$VERSION" \
            $TAGS \
            --push \
            .

          docker logout "$REGISTRY" || true
