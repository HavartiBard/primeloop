services:
  postgres-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: primeloop_test
      POSTGRES_USER: primeloop
      POSTGRES_PASSWORD: primeloop_test
    ports:
      - "55432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "primeloop", "-d", "primeloop_test"]
      interval: 2s
      timeout: 2s
      retries: 15
