# Production deployment using a pre-built image and durable host-path volumes.
#
# Required in .env (or the environment):
#   PRIMELOOP_IMAGE       — published PrimeLoop image reference, e.g. ghcr.io/<owner>/primeloop:latest
#   POSTGRES_PASSWORD     — password for the bundled Postgres
#   SECRET_ENCRYPTION_KEY — 64-char hex (openssl rand -hex 32)
# Optional:
#   PRIMELOOP_DATA_DIR    — host directory for all durable state (default ./data)
#   PRIMELOOP_PORT        — host port for the dashboard/API (default 3100)
#
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: primeloop
      POSTGRES_USER: primeloop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - ${PRIMELOOP_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "primeloop"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${PRIMELOOP_IMAGE:?set PRIMELOOP_IMAGE to a published PrimeLoop image, or build from source with docker-compose.yml}
    volumes:
      - ${PRIMELOOP_DATA_DIR:-./data}/codex:/root/.codex
      - ${PRIMELOOP_DATA_DIR:-./data}/workspace:/workspace
      # Catalog YAML is durable storage. Mounted read-write because Git catalog
      # mode (CATALOG_SOURCE_TYPE=git) clones/pulls into this path on startup,
      # and the entrypoint seeds defaults into it on first boot.
      # If you use local mode and edit YAML on the host, you may add :ro
      # after the first boot.
      - ${PRIMELOOP_DATA_DIR:-./data}/catalog:/app/catalog
    environment:
      DATABASE_URL: postgresql://primeloop:${POSTGRES_PASSWORD}@postgres:5432/primeloop
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:?required}
      PRIMELOOP_CORS_ORIGINS: ${PRIMELOOP_CORS_ORIGINS:-}
      LANGGRAPH_API_URL: ${LANGGRAPH_API_URL:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOCAL_LLM_ENABLED: ${LOCAL_LLM_ENABLED:-0}
      LOCAL_LLM_TYPE: ${LOCAL_LLM_TYPE:-auto}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-}
      LOCAL_LLM_HOST: ${LOCAL_LLM_HOST:-}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-}
      LOCAL_LLM_NAME: ${LOCAL_LLM_NAME:-local-env}
      AGENT_REPO_ROOT: ${AGENT_REPO_ROOT:-/workspace/repo}
      AGENT_WORKTREE_ROOT: ${AGENT_WORKTREE_ROOT:-/workspace/agents}
      GITEA_TOKEN: ${GITEA_TOKEN:-}
      # Catalog source (see docs/runtime-packaging.md)
      CATALOG_SOURCE_TYPE: ${CATALOG_SOURCE_TYPE:-local}
      CATALOG_GIT_URL: ${CATALOG_GIT_URL:-}
      CATALOG_GIT_REF: ${CATALOG_GIT_REF:-main}
      CATALOG_GIT_TOKEN: ${CATALOG_GIT_TOKEN:-}
      WORKSPACE_SYNC_INTERVAL: ${WORKSPACE_SYNC_INTERVAL:-3600}
      # Launcher-managed isolated runtimes (spec 025) — OPT-IN, off by default.
      # To enable: set LAUNCHER_ENABLED=1 + LAUNCHER_AUTH_SECRET, point
      # OPENSANDBOX_IMAGE_OPENCODE at a built runtime image, and start with
      # `docker compose -f docker-compose.prod.yml --profile launcher up`.
      LAUNCHER_AUTH_SECRET: ${LAUNCHER_AUTH_SECRET:-}
      LAUNCHER_URL: ${LAUNCHER_URL:-http://launcher:8787}
      LAUNCHER_ENABLED: ${LAUNCHER_ENABLED:-0}
      LAUNCHER_ADAPTER: ${LAUNCHER_ADAPTER:-docker}
    ports:
      - "${PRIMELOOP_PORT:-3100}:3100"
    extra_hosts:
      # Lets the container reach LLM servers running on the host
      # (Ollama, LM Studio, …) via host.docker.internal on Linux.
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Opt-in: only started with `--profile launcher`.
  launcher:
    profiles: ["launcher"]
    image: ${PRIMELOOP_IMAGE:?set PRIMELOOP_IMAGE to a published PrimeLoop image, or build from source with docker-compose.yml}
    command: ["node", "dist/launcher/index.js"]
    environment:
      LAUNCHER_AUTH_SECRET: ${LAUNCHER_AUTH_SECRET:-}
      LAUNCHER_PORT: ${LAUNCHER_PORT:-8787}
      LAUNCHER_VERSION: ${LAUNCHER_VERSION:-1.0.0}
      LAUNCHER_ADAPTER: ${LAUNCHER_ADAPTER:-docker}
      OPENSANDBOX_URL: ${OPENSANDBOX_URL:-http://opensandbox:8080}
      OPENSANDBOX_API_KEY: ${OPENSANDBOX_API_KEY:-}
      OPENSANDBOX_IMAGE_OPENCODE: ${OPENSANDBOX_IMAGE_OPENCODE:-opencode/opencode:latest}
    ports:
      - "8787:8787"
    volumes:
      # Docker adapter needs the host socket to provision sibling runtime
      # containers; the workspace mount lets the launcher bind worktrees that
      # the backend exclusively creates/mutates.
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PRIMELOOP_DATA_DIR:-./data}/workspace:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
