services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: primeloop
      POSTGRES_USER: primeloop
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - /mnt/user/appdata/primeloop/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "primeloop"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: code.klsll.com/havartibard/primeloop:latest
    volumes:
      # Durable operator/agent state lives in host-mounted paths so the app image
      # can be replaced without losing Codex state or managed workspace content.
      - /mnt/user/appdata/primeloop/codex:/root/.codex
      - /mnt/user/appdata/primeloop/workspace:/workspace
    environment:
      DATABASE_URL: postgresql://primeloop:${POSTGRES_PASSWORD}@postgres:5432/primeloop
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY:?required}
      LANGGRAPH_API_URL: ${LANGGRAPH_API_URL:-}
      RACLETTE_API_URL: ${RACLETTE_API_URL:-http://192.168.20.169:9119}
      RACLETTE_SESSION_TOKEN: ${RACLETTE_SESSION_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID:-C0AU0620ATX}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOCAL_LLM_ENABLED: ${LOCAL_LLM_ENABLED:-0}
      LOCAL_LLM_TYPE: ${LOCAL_LLM_TYPE:-auto}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-}
      LOCAL_LLM_HOST: ${LOCAL_LLM_HOST:-}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-}
      LOCAL_LLM_NAME: ${LOCAL_LLM_NAME:-local-env}
      AGENT_REPO_ROOT: ${AGENT_REPO_ROOT:-/workspace/repo}
      AGENT_WORKTREE_ROOT: ${AGENT_WORKTREE_ROOT:-/workspace/agents}
      GITEA_TOKEN: ${GITEA_TOKEN:-}
      # Launcher-managed isolated runtimes (spec 025) — OPT-IN, off by default.
      # To enable: set LAUNCHER_ENABLED=1 + LAUNCHER_AUTH_SECRET, point
      # OPENSANDBOX_IMAGE_OPENCODE at a built runtime image, and start with
      # `docker compose --profile launcher up`.
      LAUNCHER_AUTH_SECRET: ${LAUNCHER_AUTH_SECRET:-}
      LAUNCHER_URL: ${LAUNCHER_URL:-http://launcher:8787}
      LAUNCHER_ENABLED: ${LAUNCHER_ENABLED:-0}
      LAUNCHER_ADAPTER: ${LAUNCHER_ADAPTER:-docker}
    ports:
      - "3100:3100"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Opt-in: only started with `docker compose --profile launcher up`.
  launcher:
    profiles: ["launcher"]
    image: code.klsll.com/havartibard/primeloop:latest
    command: ["node", "dist/launcher/index.js"]
    environment:
      LAUNCHER_AUTH_SECRET: ${LAUNCHER_AUTH_SECRET:-}
      LAUNCHER_PORT: ${LAUNCHER_PORT:-8787}
      LAUNCHER_VERSION: ${LAUNCHER_VERSION:-1.0.0}
      LAUNCHER_ADAPTER: ${LAUNCHER_ADAPTER:-docker}
      OPENSANDBOX_URL: ${OPENSANDBOX_URL:-http://opensandbox:8080}
      OPENSANDBOX_API_KEY: ${OPENSANDBOX_API_KEY:-}
      OPENSANDBOX_IMAGE_OPENCODE: ${OPENSANDBOX_IMAGE_OPENCODE:-opencode/opencode:latest}
    ports:
      - "8787:8787"
    volumes:
      # The launcher must mount the same durable workspace root; runtime containers
      # remain disposable and should not own the authoritative workspace state.
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/user/appdata/primeloop/workspace:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
