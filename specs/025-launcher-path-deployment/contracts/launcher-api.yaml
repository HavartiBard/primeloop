openapi: 3.1.0
info:
  title: PrimeLoop Launcher API
  version: 1.0.0
  description: |
    Minimal contract for launcher-managed isolated runtime provisioning in the
    default PrimeLoop deployment path for managed local OpenCode agents.

    Phase 1 standardizes on OpenCode as the remote harness target and OpenSandbox
    as the container isolation substrate. Pi-as-remote-harness work is deferred.
servers:
  - url: http://launcher:8787
paths:
  /health:
    get:
      summary: Launcher health status (includes OpenSandbox reachability)
      operationId: getLauncherHealth
      responses:
        '200':
          description: Launcher is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LauncherHealth'
  /agents:
    post:
      summary: Provision or reconcile a managed local OpenCode runtime via OpenSandbox
      operationId: provisionAgentRuntime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvisionRequest'
      responses:
        '200':
          description: Runtime already existed and is usable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisionResponse'
        '201':
          description: Runtime provisioned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisionResponse'
        '401':
          description: Launcher authentication failed
        '409':
          description: Agent runtime could not be reconciled safely
        '502':
          description: Underlying container runtime (OpenSandbox) failed
  /agents/{agentId}:
    get:
      summary: Inspect managed OpenCode runtime state
      operationId: inspectAgentRuntime
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Runtime state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeStatus'
        '404':
          description: No runtime known for the agent
    delete:
      summary: Tear down managed OpenCode runtime state
      operationId: deleteAgentRuntime
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '204':
          description: Runtime removed
        '404':
          description: No runtime known for the agent
  /agents/{agentId}/restart:
    post:
      summary: Restart an existing managed OpenCode runtime
      operationId: restartAgentRuntime
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Restart accepted and runtime state returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeStatus'
        '404':
          description: No runtime known for the agent
  /agents/{agentId}/acp-endpoint:
    get:
      summary: Fetch current ACP endpoint for remote harness communication
      operationId: getAcpEndpoint
      parameters:
        - $ref: '#/components/parameters/AgentId'
      responses:
        '200':
          description: Current ACP endpoint details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcpEndpoint'
        '404':
          description: No runtime known for the agent
        '503':
          description: Runtime is not ready to accept ACP connections
components:
  parameters:
    AgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
  schemas:
    LauncherHealth:
      type: object
      required: [status, launcherVersion]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        launcherVersion:
          type: string
        openSandboxReachable:
          type: boolean
        containerRuntimeVersion:
          type: string
          description: OpenSandbox or underlying container runtime version
        notes:
          type: array
          items:
            type: string
    ProvisionRequest:
      type: object
      required:
        - agentId
        - runtimeFamily
        - workdir
        - env
      properties:
        agentId:
          type: string
        runtimeFamily:
          type: string
          enum: [opencode]
          description: Only OpenCode is supported in phase 1; Pi remote harness is deferred
        workdir:
          type: string
          description: Path to the agent's assigned worktree (mounted read-only or read-write as appropriate)
        env:
          type: object
          additionalProperties:
            type: string
          description: Environment variables passed to the runtime container (e.g., ACP endpoint config, secrets via broker)
        expectedMounts:
          type: array
          items:
            $ref: '#/components/schemas/MountSpec'
          description: Additional mounts beyond workdir and brokered credentials
        networkPolicy:
          $ref: '#/components/schemas/NetworkPolicy'
        runtimeImage:
          type: string
          description: Optional override for the OpenCode runtime image (defaults to configured image)
    ProvisionResponse:
      type: object
      required:
        - agentId
        - acpEndpoint
        - runtimeStatus
        - containerIdentity
      properties:
        agentId:
          type: string
        acpEndpoint:
          $ref: '#/components/schemas/AcpEndpoint'
        runtimeStatus:
          $ref: '#/components/schemas/RuntimeStatus'
        containerIdentity:
          type: string
          description: Container ID or OpenSandbox slot identifier for debugging
    RuntimeStatus:
      type: object
      required:
        - agentId
        - state
        - healthStatus
        - workdir
      properties:
        agentId:
          type: string
        state:
          type: string
          enum: [provisioning, ready, unhealthy, reprovisioning, tearing_down, unavailable]
        healthStatus:
          type: string
          enum: [healthy, degraded, failed, unknown]
        containerIdentity:
          type: string
        acpEndpoint:
          $ref: '#/components/schemas/AcpEndpoint'
        workdir:
          type: string
        mounts:
          type: array
          items:
            $ref: '#/components/schemas/MountSpec'
        networkPolicy:
          $ref: '#/components/schemas/NetworkPolicy'
        lastTransitionReason:
          type: string
          description: Human-readable reason for the last state transition (e.g., "container started", "health check failed")
    AcpEndpoint:
      type: object
      required:
        - protocol
        - host
        - port
        - path
      properties:
        protocol:
          type: string
          enum: [http, https, ws, wss]
          description: Transport protocol for the ACP session (HTTP/WebSocket)
        host:
          type: string
          description: Hostname or IP address where the remote OpenCode runtime listens
        port:
          type: integer
          minimum: 1
          maximum: 65535
        path:
          type: string
          description: Path prefix for ACP endpoints (e.g., `/acp`)
        authHeader:
          type: string
          description: Optional HTTP Authorization header value for the ACP endpoint
        tlsCaCertPath:
          type: string
          description: Optional path to CA cert inside the launcher container for TLS verification
    MountSpec:
      type: object
      required: [path, mode, purpose]
      properties:
        path:
          type: string
        mode:
          type: string
          enum: [ro, rw]
        purpose:
          type: string
          description: Description of the mount's role (e.g., "worktree", "credentials", "logs")
    NetworkPolicy:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [default-deny, allowlist]
        allowlist:
          type: array
          items:
            type: string
          description: Allowed outbound destinations when mode is allowlist
