## Profile Primitives

### List Profile Primitives

```http
GET /profiles/{profile_id}/primitives
Authorization: Bearer <agent_token>
```

**Response (200 OK)**:
```json
{
  "primitives": [
    {
      "id": 1,
      "capability_profile_id": "prime.default",
      "platform_primitive_id": "delegate",
      "is_granted": true,
      "metadata": {}
    }
  ]
}
```

### Grant Primitive to Profile

```http
POST /profiles/{profile_id}/primitives
Authorization: Bearer <agent_token>
Content-Type: application/json

{
  "platform_primitive_id": "delegate",
  "is_granted": true,
  "metadata": {}
}
```

**Response (201 Created)**:
```json
{
  "id": 1,
  "capability_profile_id": "prime.default",
  "platform_primitive_id": "delegate",
  "is_granted": true,
  "metadata": {},
  "created_at": "2026-06-24T12:00:00Z"
}
```

### Revoke Primitive from Profile

```http
DELETE /profiles/{profile_id}/primitives/{primitive_id}
Authorization: Bearer <agent_token>
```

**Response (204 No Content)**

