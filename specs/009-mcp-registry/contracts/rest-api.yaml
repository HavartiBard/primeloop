# Spec 009: Capability Registry REST API Contracts

**Feature Branch**: `009-mcp-registry`  
**Date**: 2026-06-24  
**Status**: Draft

---

## Base Path

```
/api/v1/capability-registry
```

---

## Platform Primitives

### List All Primitives

```http
GET /primitives
Authorization: Bearer <agent_token>
```

**Response (200 OK)**:
```json
{
  "primitives": [
    {
      "id": "delegate",
      "display_name": "Delegate To Agent",
      "description": "Delegate a sub-task to the best available agent for a capability.",
      "is_prime_only": false,
      "requires_approval": false,
      "metadata": {}
    }
  ]
}
```

### Get Primitive by ID

```http
GET /primitives/{primitive_id}
Authorization: Bearer <agent_token>
```

**Response (200 OK)**:
```json
{
  "id": "delegate",
  "display_name": "Delegate To Agent",
  "description": "Delegate a sub-task to the best available agent for a capability.",
  "is_prime_only": false,
  "requires_approval": false,
  "metadata": {}
}
```

