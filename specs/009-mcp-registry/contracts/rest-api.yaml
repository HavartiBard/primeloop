### Get Adapter Health

```http
GET /adapters/{adapter_id}/health
Authorization: Bearer <agent_token>
```

**Response (200 OK)**:
```json
{
  "provider_adapter_id": "github-mcp",
  "last_check": "2026-06-24T12:00:00Z",
  "is_healthy": true,
  "health_error": null,
  "latency_ms": 45,
  "metadata": {},
  "created_at": "2026-06-24T12:00:00Z",
  "updated_at": "2026-06-24T12:00:00Z"
}
```

### Update Adapter Health

```http
PUT /adapters/{adapter_id}/health
Authorization: Bearer <agent_token>
Content-Type: application/json

{
  "is_healthy": true,
  "health_error": null,
  "latency_ms": 45,
  "metadata": {}
}
```

**Response (200 OK)**:
```json
{
  "success": true
}
```

