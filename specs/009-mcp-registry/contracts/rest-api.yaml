## Provider Adapters

### List All Adapters

```http
GET /adapters
Authorization: Bearer <agent_token>
```

**Response (200 OK)**:
```json
{
  "adapters": [
    {
      "id": "github-mcp",
      "display_name": "GitHub MCP Server",
      "description": "MCP server for GitHub repository operations",
      "adapter_type": "mcp-http",
      "requires_credentials": true,
      "credential_needs": [
        {
          "env_name": "GITEA_TOKEN",
          "scopes": ["repository"]
        }
      ],
      "health_check_config": {
        "endpoint": "/health",
        "interval_ms": 30000
      },
      "metadata": {
        "base_url": "https://github.example.com"
      },
      "is_active": true
    }
  ]
}
```

### Get Adapter by ID

```http
GET /adapters/{adapter_id}
Authorization: Bearer <agent_token>
```

**Response (200 OK)**:
```json
{
  "id": "github-mcp",
  "display_name": "GitHub MCP Server",
  "description": "MCP server for GitHub repository operations",
  "adapter_type": "mcp-http",
  "requires_credentials": true,
  "credential_needs": [
    {
      "env_name": "GITEA_TOKEN",
      "scopes": ["repository"]
    }
  ],
  "health_check_config": {
    "endpoint": "/health",
    "interval_ms": 30000
  },
  "metadata": {
    "base_url": "https://github.example.com"
  },
  "is_active": true
}
```

### Update Adapter Health

```http
POST /adapters/{adapter_id}/health
Authorization: Bearer <agent_token>
Content-Type: application/json

{
  "is_healthy": true,
  "latency_ms": 45,
  "metadata": {}
}
```

**Response (200 OK)**:
```json
{
  "success": true
}
```

