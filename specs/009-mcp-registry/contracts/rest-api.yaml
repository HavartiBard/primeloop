## Capability-to-Adapter Mappings

### List Mappings for Bundle

```http
GET /bundles/{bundle_id}/mappings
Authorization: Bearer <agent_token>
```

**Response (200 OK)**:
```json
{
  "mappings": [
    {
      "id": 1,
      "capability_bundle_id": "repo.read",
      "provider_adapter_id": "github-mcp",
      "is_default": true,
      "priority": 10,
      "metadata": {}
    }
  ]
}
```

### Create Mapping

```http
POST /bundles/{bundle_id}/mappings
Authorization: Bearer <agent_token>
Content-Type: application/json

{
  "provider_adapter_id": "github-mcp",
  "is_default": true,
  "priority": 10,
  "metadata": {}
}
```

**Response (201 Created)**:
```json
{
  "id": 1,
  "capability_bundle_id": "repo.read",
  "provider_adapter_id": "github-mcp",
  "is_default": true,
  "priority": 10,
  "metadata": {},
  "created_at": "2026-06-24T12:00:00Z"
}
```

### Delete Mapping

```http
DELETE /mappings/{mapping_id}
Authorization: Bearer <agent_token>
```

**Response (204 No Content)**

