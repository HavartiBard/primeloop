## Agent Runtime Messages

### `agent.tool_grant`

Sent to agent when their tool grant is resolved.

**Payload:**
```json
{
  "type": "agent.tool_grant",
  "id": "msg-123",
  "payload": {
    "grant_id": "grant-uuid",
    "granted_primitives": ["delegate", "request_approval"],
    "granted_bundles": [
      {
        "bundle_id": "repo.read",
        "adapter_id": "github-mcp"
      }
    ],
    "selected_adapters": [
      {
        "adapter_id": "github-mcp",
        "metadata": {}
      }
    ]
  }
}
```

---

### `agent.tool_grant_update`

Sent to agent when their tool grant is updated (e.g., approval granted).

**Payload:**
```json
{
  "type": "agent.tool_grant_update",
  "id": "msg-123",
  "payload": {
    "grant_id": "grant-uuid",
    "granted_primitives": ["delegate", "request_approval"],
    "granted_bundles": [
      {
        "bundle_id": "repo.read",
        "adapter_id": "github-mcp"
      }
    ],
    "selected_adapters": [
      {
        "adapter_id": "github-mcp",
        "metadata": {}
      }
    ]
  }
}
```

---

### `agent.tool_grant_revoke`

Sent to agent when a tool grant is revoked (e.g., adapter unhealthy).

**Payload:**
```json
{
  "type": "agent.tool_grant_revoke",
  "id": "msg-123",
  "payload": {
    "grant_id": "grant-uuid",
    "revoked_primitives": ["delegate"],
    "revoked_bundles": [
      {
        "bundle_id": "repo.read",
        "adapter_id": "github-mcp"
      }
    ],
    "reason": "adapter_unhealthy"
  }
}
```

---

## Error Codes

| Code | Description |
|------|-------------|
| `registry_unavailable` | Capability registry is not available |
| `profile_not_found` | Profile not found |
| `bundle_not_found` | Bundle not found |
| `adapter_not_found` | Adapter not found |
| `grant_not_found` | Grant not found |
| `insufficient_credentials` | Required credentials not available |
| `approval_required` | Approval required for this capability |
| `adapter_unhealthy` | Adapter is unhealthy |
| `invalid_scope` | Requested scope is invalid |
