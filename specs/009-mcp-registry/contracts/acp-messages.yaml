### `capability_registry.resolve_grant`

Resolve the tool grant for an agent based on their profile and current task context.

**Request:**
```json
{
  "type": "capability_registry.resolve_grant",
  "id": "msg-123",
  "payload": {
    "agent_id": "agent-uuid",
    "delegation_id": "delegation-uuid",
    "work_item_id": "work-item-uuid",
    "profile_id": "prime.default",
    "task_scope": {},
    "approval_state": "approved"
  }
}
```

**Response (Success):**
```json
{
  "type": "capability_registry.resolve_grant.response",
  "id": "msg-123",
  "success": true,
  "payload": {
    "grant_id": "grant-uuid",
    "agent_id": "agent-uuid",
    "delegation_id": "delegation-uuid",
    "work_item_id": "work-item-uuid",
    "profile_id": "prime.default",
    "task_scope": {},
    "approval_state": "approved",
    "granted_primitives": ["delegate", "request_approval"],
    "granted_bundles": [
      {
        "bundle_id": "repo.read",
        "adapter_id": "github-mcp",
        "metadata": {}
      }
    ],
    "selected_adapters": [
      {
        "adapter_id": "github-mcp",
        "metadata": {}
      }
    ],
    "excluded_primitives": [],
    "excluded_bundles": [],
    "excluded_adapters": [],
    "grant_metadata": {
      "resolved_at": "2026-06-24T12:00:00Z",
      "resolver": "harness"
    }
  }
}
```

**Response (Error - Profile Not Found):**
```json
{
  "type": "capability_registry.resolve_grant.response",
  "id": "msg-123",
  "success": false,
  "error": {
    "code": "profile_not_found",
    "message": "Profile 'prime.default' not found"
  }
}
```

**Response (Error - Insufficient Credentials):**
```json
{
  "type": "capability_registry.resolve_grant.response",
  "id": "msg-123",
  "success": false,
  "error": {
    "code": "insufficient_credentials",
    "message": "Required credentials not available for adapter 'github-mcp'",
    "missing_credentials": ["GITEA_TOKEN"]
  }
}
```

