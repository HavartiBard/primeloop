    "profile": {
      "id": "prime.default",
      "display_name": "Prime Default Profile",
      "description": "Default profile for Prime agent",
      "is_default_for_durable": false,
      "is_default_for_ephemeral": true,
      "metadata": {},
      "primitives": [
        {
