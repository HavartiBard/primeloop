# Spec 009: Capability Registry ACP Message Contracts

**Feature Branch**: `009-mcp-registry`  
**Date**: 2026-06-24  
**Status**: Draft

---

## Overview

ACP messages for capability registry operations flow through the control plane and are processed by Prime.

---

## Control Plane Messages

### `capability_registry.list_primitives`

List all platform primitives available in the registry.

**Request:**
```json
{
  "type": "capability_registry.list_primitives",
  "id": "msg-123",
  "payload": {}
}
```

**Response (Success):**
```json
{
  "type": "capability_registry.list_primitives.response",
  "id": "msg-123",
  "success": true,
  "payload": {
    "primitives": [
      {
        "id": "delegate",
        "display_name": "Delegate To Agent",
        "description": "Delegate a sub-task to the best available agent for a capability.",
        "is_prime_only": false,
        "requires_approval": false,
        "metadata": {}
      }
    ]
  }
}
```

**Response (Error):**
```json
{
  "type": "capability_registry.list_primitives.response",
  "id": "msg-123",
  "success": false,
  "error": {
    "code": "registry_unavailable",
    "message": "Capability registry is not available"
  }
}
```

