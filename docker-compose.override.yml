# goudai.lab.klsll.com — local path overrides for dev volumes
services:
  backend-dev:
    volumes:
      - ~/primeloop-data/codex:/root/.codex
      - ~/primeloop-data/workspace:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"

  launcher-dev:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/primeloop-data/workspace:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
